name: Release
on:
  push:
    branches:
      - legacy

concurrency: ${{ github.workflow }}-${{ github.ref }}

permissions:
  id-token: write # Required for OIDC
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          token: ${{ secrets.BELLA_ACTION_TOKEN }}

      - name: Configure Git
        run: |
          git config --global user.email '${{ secrets.BELLA_EMAIL_ADDRESS }}'
          git config --global user.name 'MagicBella'

      - uses: actions/setup-node@v6
        with:
          node-version: 24.x
          registry-url: https://registry.npmjs.org
      - uses: bahmutov/npm-install@v1

      - name: Block major releases on legacy
        run: |
          if yarn changeset status --output=release.json; then
            if jq -e '.releases[] | select(.type == "major")' release.json > /dev/null; then
              echo "Major releases are not allowed from the legacy branch."
              exit 1
            fi
          else
            echo "No pending changesets; continuing"
          fi

      - name: Create Release Pull Request or Publish to npm
        uses: changesets/action@v1
        id: changesets
        with:
          publish: yarn changeset:release
          commit: 'chore: version packages'
          title: 'next release'
        env:
          GITHUB_TOKEN: ${{ secrets.BELLA_ACTION_TOKEN }}
          NPM_CONFIG_PROVENANCE: true
